name: OWRT-NSY-G16-PLUS

on:
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: '手动调整插件包，多个请用\n符号隔开。'
        required: false
        type: string
      TEST:
        description: '仅输出配置文件，不编译固件。'
        default: 'false'
        required: false
        type: boolean

permissions: write-all

jobs:
  config:
    name: ROCKCHIP-NSY-G16-PLUS-WIFI-NO
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      WRT_CONFIG: ROCKCHIP-NSY-G16-PLUS-WIFI-NO
      WRT_THEME: aurora
      WRT_NAME: OWRT
      WRT_SSID: OWRT
      WRT_WORD: 12345678
      WRT_IP: 192.168.1.1
      WRT_PW: 无
      WRT_REPO: https://github.com/Hahjishu/immortalwrt.git
      WRT_BRANCH: owrt
      WRT_SOURCE: Hahjishu/immortalwrt
      WRT_PACKAGE: ${{inputs.PACKAGE}}
      WRT_TEST: ${{inputs.TEST}}
      WRT_APPEND_GENERAL: false
